name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Smoke-test the action on every supported runner with both fresh-install
  # and cache-restore code paths.
  install:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is darwin.arm64; ubuntu-latest is linux.x64.
        # macos-13 (darwin.x64) is omitted because GitHub's macos-13
        # runner pool currently queues for 15+ min — supported by the
        # action, just not gated by CI. Re-add when pool capacity recovers.
        runner: [ubuntu-latest, macos-latest]
        version: ['latest', 'v0.18.11']
        cache: ['true', 'false']
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}
          cache: ${{ matrix.cache }}
          github-token: ${{ github.token }}
      - name: Smoke test
        run: |
          set -euo pipefail
          ailang --version
          test -n "${{ steps.setup.outputs.version }}"
          echo "resolved version: ${{ steps.setup.outputs.version }}"
          echo "cache-hit: ${{ steps.setup.outputs.cache-hit }}"

  # Note: a dedicated miss→hit "cache-roundtrip" job was tried but is
  # impossible to make deterministic without a `cache-key-suffix` input —
  # GitHub caches persist across workflow runs (7-day TTL), so the
  # "first" install always hits on subsequent runs. The miss→hit logic
  # itself lives in @actions/cache and is upstream-tested. The matrix
  # above exercises both `cache: true` and `cache: false` paths, which
  # is the coverage we actually own.
