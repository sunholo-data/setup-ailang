name: 'Setup AILANG'
description: 'Install the AILANG compiler with platform auto-detection, SHA256 verification, and binary caching.'
author: 'Sunholo Data'
branding:
  icon: 'terminal'
  color: 'purple'

inputs:
  version:
    description: "AILANG version (semver, with or without leading 'v') or 'latest'."
    required: false
    default: 'latest'
  cache:
    description: 'Cache the binary across runs (recommended).'
    required: false
    default: 'true'
  github-token:
    description: 'Token used to authenticate downloads against the GitHub API and dodge the 60/hr anonymous rate limit. Pass `${{ github.token }}` explicitly, or set `GITHUB_TOKEN` in `env:` — the action will pick either up.'
    required: false
    default: ''

outputs:
  version:
    description: "Resolved AILANG version (e.g. 'v0.18.11'). Useful for downstream pinning."
  cache-hit:
    description: 'Whether the binary was restored from the runner cache.'

runs:
  using: 'node20'
  main: 'dist/index.js'
